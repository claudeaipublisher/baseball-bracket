<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>Altamonte Scouting</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
    font-size: 16px;
    line-height: 1.4;
    padding-bottom: 80px;
  }
  /* HEADER */
  .top {
    position: sticky; top: 0; z-index: 50;
    background: #0f172a; color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .title-bar {
    padding: 10px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.85; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    font-size: 12px; font-weight: 700; padding: 6px 10px;
    background: rgba(255,255,255,0.1); color: white; border: 0; border-radius: 4px;
    cursor: pointer; letter-spacing: 0.5px;
  }
  .tab.active { background: #f59e0b; color: #0f172a; }
  /* LINEUP STRIP */
  .lineup {
    display: grid; gap: 4px;
    padding: 6px 10px 10px;
    grid-template-columns: repeat(9, 1fr);
  }
  .lineup.subs-mode { grid-template-columns: repeat(3, 1fr); padding: 6px 80px 10px; }
  .slot {
    background: #334155; color: white; border: 0;
    aspect-ratio: 1;
    min-height: 48px;
    padding: 6px 2px;
    border-radius: 6px;
    font-weight: 800; font-size: 18px;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }
  .slot:active { transform: scale(0.95); }
  .slot.active { background: #f59e0b; color: #0f172a; box-shadow: 0 0 0 3px #fbbf24; }
  .slot .num { display: block; font-size: 10px; opacity: 0.65; font-weight: 600; margin-top: -2px; }
  /* CARD */
  .card {
    background: white;
    margin: 12px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .card-head {
    background: linear-gradient(180deg, #1e293b 0%, #334155 100%);
    color: white;
    padding: 14px 16px;
    position: relative;
  }
  .player-number {
    font-size: 56px; font-weight: 900; line-height: 1;
    display: inline-block; vertical-align: middle;
    margin-right: 12px;
    letter-spacing: -2px;
  }
  .player-meta { display: inline-block; vertical-align: middle; }
  .player-name { font-size: 20px; font-weight: 800; line-height: 1.1; }
  .player-role { font-size: 13px; opacity: 0.75; font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }
  .tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 800; padding: 4px 8px;
    border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .tag.power { background: #fbbf24; color: #0f172a; }
  .tag.bunt { background: #f97316; color: white; }
  .tag.k { background: #475569; color: white; }
  .tag.runner { background: #06b6d4; color: white; }
  .tag.patient { background: #10b981; color: white; }
  /* STATS BAR */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
  }
  .stat {
    padding: 10px 6px;
    text-align: center;
    border-right: 1px solid #e2e8f0;
  }
  .stat:last-child { border-right: 0; }
  .stat-label { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.5px; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 900; color: #0f172a; line-height: 1.1; margin-top: 2px; font-variant-numeric: tabular-nums; }
  /* SUMMARY */
  .summary {
    padding: 12px 16px;
    background: #fef3c7;
    border-bottom: 1px solid #fde68a;
    font-size: 15px;
    font-weight: 600;
    color: #78350f;
  }
  /* SPRAY CHART */
  .chart-section {
    padding: 12px 12px 8px;
  }
  .section-label {
    font-size: 11px; font-weight: 800;
    color: #475569; letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px; padding: 0 4px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .chart-wrap {
    width: 100%;
    aspect-ratio: 1 / 1.05;
    background: #f0fdf4;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #d1fae5;
  }
  .chart-wrap svg { width: 100%; height: 100%; display: block; }
  /* LEGEND */
  .legend {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 6px 12px;
    padding: 10px 12px;
    font-size: 12px;
    color: #334155;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { display: inline-block; width: 12px; height: 12px; flex-shrink: 0; }
  .swatch.circle { border-radius: 50%; }
  .swatch.triangle { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom-style: solid; border-bottom-width: 12px; }
  .swatch.diamond { transform: rotate(45deg); }
  .swatch.x-mark { position: relative; }
  .swatch.x-mark::before, .swatch.x-mark::after {
    content: ''; position: absolute; left: 50%; top: 0;
    width: 2px; height: 100%; background: currentColor;
  }
  .swatch.x-mark::before { transform: translateX(-50%) rotate(45deg); }
  .swatch.x-mark::after { transform: translateX(-50%) rotate(-45deg); }
  /* TENDENCIES */
  .tendencies {
    padding: 10px 16px 14px;
    border-top: 1px solid #e2e8f0;
  }
  .tendencies ul { list-style: none; padding: 0; margin: 0; }
  .tendencies li {
    padding: 6px 0 6px 18px;
    position: relative;
    font-size: 15px;
    color: #1e293b;
    line-height: 1.4;
  }
  .tendencies li::before {
    content: '▸'; position: absolute; left: 0; top: 5px;
    color: #f59e0b; font-weight: 900;
  }
  /* COLLAPSIBLE */
  .collapse-trigger {
    width: 100%; padding: 14px 16px;
    background: white; border: 0; border-top: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 800;
    color: #475569; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; text-align: left;
  }
  .collapse-trigger::after {
    content: '▼'; font-size: 10px; transition: transform 0.2s;
  }
  .collapse-trigger.open::after { transform: rotate(180deg); }
  .collapse-content {
    display: none;
    padding: 4px 16px 16px;
    border-top: 1px solid #e2e8f0;
  }
  .collapse-content.open { display: block; }
  .ab-row {
    padding: 8px 10px;
    margin-top: 6px;
    background: #f8fafc;
    border-left: 3px solid #cbd5e1;
    border-radius: 4px;
    font-size: 14px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .ab-row.hit { border-left-color: #16a34a; background: #f0fdf4; }
  .ab-row.out { border-left-color: #dc2626; background: #fef2f2; }
  .ab-row.bunt { border-left-color: #ea580c; background: #fff7ed; }
  .ab-row.k { border-left-color: #64748b; }
  .ab-row.bb { border-left-color: #06b6d4; background: #ecfeff; }
  .ab-row.today { box-shadow: 0 0 0 2px #0ea5e9; }
  .ab-game { font-size: 10px; font-weight: 800; color: #64748b; padding: 2px 6px; background: white; border-radius: 3px; flex-shrink: 0; }
  .ab-game.today { background: #0ea5e9; color: white; }
  /* TRACKER */
  .tracker-bar {
    padding: 12px 16px;
    border-top: 1px solid #e2e8f0;
    background: #fafafa;
  }
  .tracker-summary {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
  }
  .log-btn {
    width: 100%;
    background: #0f172a; color: white;
    border: 0; border-radius: 8px;
    padding: 14px;
    font-size: 15px; font-weight: 800;
    letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer;
  }
  .log-btn:active { background: #1e293b; }
  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, 0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    width: 100%;
    max-width: 500px;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: #64748b; margin-bottom: 16px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-label { font-size: 11px; font-weight: 800; color: #475569; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .btn-grid {
    display: grid;
    gap: 8px;
  }
  .btn-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .btn-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .opt-btn {
    background: #f1f5f9; color: #0f172a;
    border: 2px solid transparent; border-radius: 8px;
    padding: 14px 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    text-align: center;
  }
  .opt-btn.selected { background: #fef3c7; border-color: #f59e0b; }
  .opt-btn.hit { background: #f0fdf4; color: #15803d; }
  .opt-btn.hit.selected { background: #bbf7d0; border-color: #16a34a; }
  .opt-btn.out { background: #fef2f2; color: #b91c1c; }
  .opt-btn.out.selected { background: #fecaca; border-color: #dc2626; }
  .opt-btn.k { background: #f1f5f9; color: #475569; }
  .opt-btn.k.selected { background: #e2e8f0; border-color: #64748b; }
  .opt-btn.bb { background: #ecfeff; color: #0e7490; }
  .opt-btn.bb.selected { background: #cffafe; border-color: #06b6d4; }
  .opt-btn.bunt { background: #fff7ed; color: #c2410c; }
  .opt-btn.bunt.selected { background: #fed7aa; border-color: #ea580c; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 14px; border: 0; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; }
  .btn-cancel { background: #f1f5f9; color: #475569; }
  .btn-save { background: #0f172a; color: white; }
  .btn-save:disabled { background: #cbd5e1; cursor: not-allowed; }
  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #e2e8f0;
    padding: 10px 12px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
    z-index: 40;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }
  .nav-btn {
    background: #f1f5f9; color: #0f172a;
    border: 0; border-radius: 8px;
    padding: 14px;
    font-size: 15px; font-weight: 800;
    cursor: pointer; letter-spacing: 0.5px;
  }
  .nav-btn:active { background: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* RESET CONTROL */
  .reset-game {
    text-align: center; padding: 16px;
    font-size: 12px; color: #94a3b8;
  }
  .reset-game button {
    background: transparent; border: 1px solid #cbd5e1;
    color: #64748b; padding: 6px 12px; font-size: 12px;
    border-radius: 4px; cursor: pointer; font-weight: 600;
  }
</style>
</head>
<body>

<div class="top">
  <div class="title-bar">
    <div class="title">Altamonte Scouting</div>
    <div class="tabs">
      <button class="tab active" id="tab-starters" onclick="setMode('starters')">STARTERS</button>
      <button class="tab" id="tab-subs" onclick="setMode('subs')">SUBS</button>
    </div>
  </div>
  <div class="lineup" id="lineup"></div>
</div>

<div class="card" id="card"></div>

<div class="reset-game">
  <button onclick="resetGame()">Clear today's at-bats</button>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prev-btn" onclick="nav(-1)">← PREV</button>
  <button class="nav-btn" id="next-btn" onclick="nav(1)">NEXT →</button>
</div>

<div class="modal-bg" id="modal" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Log At-Bat</div>
    <div class="modal-sub" id="modal-sub"></div>

    <div class="modal-section">
      <div class="modal-section-label">Outcome</div>
      <div class="btn-grid cols-3" id="outcome-grid">
        <button class="opt-btn hit" data-outcome="HIT">HIT</button>
        <button class="opt-btn out" data-outcome="OUT">OUT</button>
        <button class="opt-btn bunt" data-outcome="BUNT">BUNT</button>
        <button class="opt-btn k" data-outcome="K">K</button>
        <button class="opt-btn bb" data-outcome="BB">WALK</button>
        <button class="opt-btn" data-outcome="HBP">HBP</button>
      </div>
    </div>

    <div class="modal-section" id="contact-section" style="display:none;">
      <div class="modal-section-label">Contact Type</div>
      <div class="btn-grid cols-3" id="contact-grid">
        <button class="opt-btn" data-contact="GB">GROUND</button>
        <button class="opt-btn" data-contact="LD">LINE DRIVE</button>
        <button class="opt-btn" data-contact="FB">FLY/POP</button>
      </div>
    </div>

    <div class="modal-section" id="bunt-result-section" style="display:none;">
      <div class="modal-section-label">Bunt Result</div>
      <div class="btn-grid cols-2" id="bunt-result-grid">
        <button class="opt-btn hit" data-buntresult="SAFE">SAFE (HIT)</button>
        <button class="opt-btn out" data-buntresult="OUT">OUT</button>
      </div>
    </div>

    <div class="modal-section" id="location-section" style="display:none;">
      <div class="modal-section-label">Location</div>
      <div class="btn-grid cols-3" id="location-grid">
        <button class="opt-btn" data-loc="LF">LF</button>
        <button class="opt-btn" data-loc="CF">CF</button>
        <button class="opt-btn" data-loc="RF">RF</button>
        <button class="opt-btn" data-loc="3B">3B</button>
        <button class="opt-btn" data-loc="SS">SS</button>
        <button class="opt-btn" data-loc="2B">2B</button>
        <button class="opt-btn" data-loc="1B">1B</button>
        <button class="opt-btn" data-loc="P">P</button>
        <button class="opt-btn" data-loc="C">C/Foul</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveAB()" disabled>Save</button>
    </div>
  </div>
</div>

<script>
// =================== DATA ===================
// Coordinates use a 400x440 SVG canvas (catcher's view)
// Home plate is at (200, 400), field opens up toward (200, 50)
const FIELD = {
  HOME: [200, 400], BEHIND_HOME: [200, 425],
  FIRST_BASE: [305, 295], SECOND_BASE: [200, 195], THIRD_BASE: [95, 295],
  PITCHER: [200, 305], SS: [155, 250], BETWEEN_FIRST_SECOND: [255, 245],
  SHALLOW_LF: [110, 175], DEEP_LF: [70, 110],
  SHALLOW_CF: [200, 155], DEEP_CF: [200, 85],
  SHALLOW_RF: [290, 175], DEEP_RF: [330, 110],
  BUNT_3B: [165, 365], BUNT_P: [200, 360], BUNT_1B: [235, 365]
};

// Helper: small random offset to avoid stacking
function nudge(coord, idx) {
  const offsets = [[0,0], [6,-4], [-5,3], [3,6], [-4,-5], [7,2], [-7,-3]];
  const o = offsets[idx % offsets.length];
  return [coord[0] + o[0], coord[1] + o[1]];
}

const PLAYERS = {

        { g: 'EO', outcome: 'HIT', contact: 'LD', desc: 'Line drive single to CF', xy: FIELD.DEEP_CF },
        { g: 'BCD', outcome: 'OUT', contact: 'FB', desc: 'Weak pop fly to 2B', xy: [205, 215] },
        { g: 'BCD', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 1B', xy: [285, 290] }
      ]
    },
    {
      id: 'haydenR', pos: 2, number: 44, name: 'Hayden R', role: '2B',

      ],
      atBats: [
        { g: 'EO', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 2B', xy: nudge(FIELD.BETWEEN_FIRST_SECOND, 0) },
        { g: 'EO', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 2B', xy: nudge(FIELD.BETWEEN_FIRST_SECOND, 1) },
        { g: 'BCD', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 3B', xy: nudge(FIELD.THIRD_BASE, 0) },
        { g: 'BCD', outcome: 'OUT', contact: 'GB', desc: 'Ground out to P', xy: nudge(FIELD.PITCHER, 0) }
      ]
    },
    {
      id: 'julianD', pos: 3, number: 5, name: 'Julian D', role: 'SS / P',
      stats: { ab: 5, h: 0, bb: 0, k: 1 },
      tags: [],
      summary: 'Center / Middle · Barrels balls to CF even when jammed',

        'Best pure hitter on team',

        'Will line out to CF rather than weak grounders'
      ],
      atBats: [
        { g: 'EO', outcome: 'OUT', contact: 'FB', desc: 'Fly out to CF', xy: FIELD.SHALLOW_CF },
        { g: 'EO', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 2B', xy: nudge(FIELD.BETWEEN_FIRST_SECOND, 2) },
        { g: 'BCD', outcome: 'OUT', contact: 'GB', desc: 'Ground out to 2B', xy: nudge(FIELD.BETWEEN_FIRST_SECOND, 3) },
        { g: 'BCD', outcome: 'OUT', contact: 'LD', desc: 'Line out to CF', xy: [200, 130] },
        { g: 'BCD', outcome: 'K', desc: 'K looking', xy: FIELD.HOME }

    },
    {

// =================== STATE ===================
let mode = 'starters'; // or 'subs'
let currentIdx = 0;

// Today's at-bats: { playerId: [{ outcome, contact, loc, xy, ts }] }
const STORAGE_KEY = 'altamonte_today_v1';
const RESET_KEY = 'altamonte_reset_date';

function loadToday() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveToday(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
let today = loadToday();

// =================== RENDER ===================
function setMode(m) {
  mode = m;
  currentIdx = 0;
  document.getElementById('tab-starters').classList.toggle('active', m === 'starters');
  document.getElementById('tab-subs').classList.toggle('active', m === 'subs');
  render();
}

function currentRoster() { return PLAYERS[mode]; }
function currentPlayer() { return currentRoster()[currentIdx]; }

function renderLineup() {
  const el = document.getElementById('lineup');
  el.className = 'lineup' + (mode === 'subs' ? ' subs-mode' : '');
  const roster = currentRoster();
  el.innerHTML = roster.map((p, i) => `
    <button class="slot ${i === currentIdx ? 'active' : ''}" onclick="selectIdx(${i})">
      ${p.pos}<span class="num">#${p.number}</span>
    </button>
  `).join('');
}

function selectIdx(i) {
  currentIdx = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nav(dir) {
  const roster = currentRoster();
  currentIdx = Math.max(0, Math.min(roster.length - 1, currentIdx + dir));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function tagHTML(tags) {
  const map = {
    power: { cls: 'power', label: '⚡ POWER' },
    bunt: { cls: 'bunt', label: '🔻 BUNT' },
    k: { cls: 'k', label: 'K CANDIDATE' },
    runner: { cls: 'runner', label: '🏃 RUNNER' },
    patient: { cls: 'patient', label: 'PATIENT' }
  };
  return tags.map(t => {
    const m = map[t]; if (!m) return '';
    return `<span class="tag ${m.cls}">${m.label}</span>`;
  }).join('');
}

function abClass(ab) {
  if (ab.outcome === 'HIT' || ab.isHit) return 'hit';
  if (ab.outcome === 'OUT') return 'out';
  if (ab.outcome === 'BUNT') return ab.isHit ? 'hit' : 'bunt';
  if (ab.outcome === 'K') return 'k';
  if (ab.outcome === 'BB' || ab.outcome === 'HBP') return 'bb';
  return '';
}

function liveStats(playerId, baseStats) {
  const live = today[playerId] || [];
  let extra = { ab: 0, h: 0, bb: 0, k: 0 };
  for (const ab of live) {
    if (ab.outcome === 'BB' || ab.outcome === 'HBP') extra.bb++;
    else { extra.ab++; if (ab.outcome === 'HIT' || ab.isHit) extra.h++; if (ab.outcome === 'K') extra.k++; }
  }
  return {
    ab: baseStats.ab + extra.ab,
    h: baseStats.h + extra.h,
    bb: baseStats.bb + extra.bb,
    k: baseStats.k + extra.k,
    extra: extra,
    liveCount: live.length
  };
}

function gameLabel(g) {
  const map = { EO: 'EO', BCD: 'BCD', STM: 'STM', GTR: 'GTR', LIVE: 'TODAY' };
  return map[g] || g;
}

function markerHTML(ab, idx, isToday) {
  const xy = ab.xy;
  if (!xy) return '';
  let color, shape;
  const isHit = ab.outcome === 'HIT' || ab.isHit;
  const isOut = ab.outcome === 'OUT' || (ab.outcome === 'BUNT' && !ab.isHit);

  if (ab.outcome === 'K') color = '#475569';
  else if (ab.outcome === 'BB' || ab.outcome === 'HBP') color = '#0891b2';
  else if (ab.outcome === 'BUNT' && ab.isHit) color = '#ea580c';
  else if (ab.outcome === 'BUNT') color = '#9a3412';
  else if (isHit) color = '#15803d';
  else color = '#b91c1c';

  const stroke = isToday ? '#0ea5e9' : 'white';
  const strokeWidth = isToday ? 3 : 1.5;
  const r = isToday ? 10 : 8;

  // K and BB at home plate area - cluster them
  if (ab.outcome === 'K') {
    const kx = xy[0] - 12 + (idx * 7);
    const ky = xy[1] + 18;
    return `
      <g>
        <circle cx="${kx}" cy="${ky}" r="${r}" fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}" opacity="0.95"/>
        <text x="${kx}" y="${ky + 4}" font-size="11" font-weight="900" text-anchor="middle" fill="white">K</text>
      </g>`;
  }
  if (ab.outcome === 'BB' || ab.outcome === 'HBP') {
    const bx = xy[0] - 30;
    const by = xy[1] + 25 + (idx * 2);
    return `
      <g>
        <circle cx="${bx}" cy="${by}" r="${r}" fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}" opacity="0.95"/>
        <text x="${bx}" y="${by + 4}" font-size="9" font-weight="900" text-anchor="middle" fill="white">BB</text>
      </g>`;
  }

  // Contact-based shape
  const contact = ab.contact || (ab.outcome === 'BUNT' ? 'BUNT' : 'OTHER');
  if (contact === 'BUNT' || ab.outcome === 'BUNT') {
    // Diamond
    const s = isToday ? 11 : 9;
    return `<polygon points="${xy[0]},${xy[1]-s} ${xy[0]+s},${xy[1]} ${xy[0]},${xy[1]+s} ${xy[0]-s},${xy[1]}"
      fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
  }
  if (contact === 'LD') {
    // Triangle (line drive)
    const s = isToday ? 11 : 9;
    return `<polygon points="${xy[0]},${xy[1]-s} ${xy[0]+s},${xy[1]+s*0.7} ${xy[0]-s},${xy[1]+s*0.7}"
      fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
  }
  if (contact === 'FB') {
    // Open circle (fly/pop)
    return `<circle cx="${xy[0]}" cy="${xy[1]}" r="${r}" fill="white" stroke="${color}" stroke-width="${strokeWidth + 1}"/>`;
  }
  // Default: filled circle (ground ball)
  return `<circle cx="${xy[0]}" cy="${xy[1]}" r="${r}" fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
}

function updateSaveBtn() {
  const s = modalState;
  let valid = false;
  if (s.outcome === 'K' || s.outcome === 'BB' || s.outcome === 'HBP') valid = true;
  else if (s.outcome === 'HIT' || s.outcome === 'OUT') valid = s.contact && s.loc;
  else if (s.outcome === 'BUNT') valid = !!s.loc && !!s.buntResult;
  document.getElementById('save-btn').disabled = !valid;
}

function locToXY(loc) {
  const map = {
    LF: FIELD.DEEP_LF, CF: FIELD.DEEP_CF, RF: FIELD.DEEP_RF,
    '3B': FIELD.THIRD_BASE, SS: FIELD.SS, '2B': FIELD.BETWEEN_FIRST_SECOND,
    '1B': FIELD.FIRST_BASE, P: FIELD.PITCHER, C: FIELD.BEHIND_HOME
  };
  return map[loc] || FIELD.HOME;
}

function saveAB() {
  const s = modalState;
  if (!s.playerId) return;
  let xy = FIELD.HOME;
  let desc = '';
  let isHit = false;

  if (s.outcome === 'K') desc = 'K';
  else if (s.outcome === 'BB') desc = 'Walk';
  else if (s.outcome === 'HBP') desc = 'Hit by pitch';
  else if (s.outcome === 'BUNT') {
    isHit = (s.buntResult === 'SAFE');
    desc = 'Bunt ' + (isHit ? 'single' : 'out') + ' to ' + s.loc;
    xy = nudge(locToXY(s.loc), Math.floor(Math.random() * 6));
    // Shift bunts toward home plate area
    if (xy[1] < 350) xy = [xy[0], 365 + Math.random() * 10];
  } else {
    isHit = s.outcome === 'HIT';
    desc = (isHit ? 'Hit' : 'Out') + ' (' + s.contact + ') to ' + s.loc;
    xy = nudge(locToXY(s.loc), Math.floor(Math.random() * 6));
  }

  const ab = {
    outcome: s.outcome,
    contact: s.contact,
    loc: s.loc,
    xy: xy,
    desc: desc,
    isHit: isHit,
    ts: Date.now()
  };

  if (!today[s.playerId]) today[s.playerId] = [];
  today[s.playerId].push(ab);
  saveToday(today);
  closeModal();
  render();
}

function clearPlayerToday(pid) {
  if (!confirm('Clear today\u2019s logged ABs for this batter?')) return;
  delete today[pid];
  saveToday(today);
  render();
}

function resetGame() {
  if (!confirm('Clear ALL today\u2019s at-bats for ALL batters? This cannot be undone.')) return;
  today = {};
  saveToday(today);
  render();
}

// Init
render();
</script>
</body>
</html>
